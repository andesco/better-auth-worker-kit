<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>Accept invitation — andrewe.dev</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="invite">
    <main class="auth-shell">
      <header class="brand">
        <img class="brand-logo" src="/assets/cloudflare-access.svg" alt="Cloudflare Access">
      </header>
      <section class="auth-card" aria-labelledby="invite-title">
        <div class="auth-card__body">
          <div class="app-identity"><span data-app-name>andrewe.dev</span></div>
          <div class="card-heading">
            <h1 id="invite-title">Create your passkey</h1>
            <p>A passkey signs you in without a password.</p>
          </div>
          <div class="information-panel">
            Your device will ask for Face ID, Touch ID, a PIN, or a security key.
          </div>
          <div class="auth-options">
            <button id="primary-action" class="primary-button" type="button">Create passkey</button>
            <output id="status" aria-live="polite"></output>
            <p class="fine-print">Invitation links are single-use and expire automatically.</p>
          </div>
        </div>
      </section>
      <footer class="project-credit">
        <a href="https://github.com/andesco/better-auth-worker-kit">better-auth-worker-kit</a>
      </footer>
    </main>
    <script type="module" src="/assets/client.js"></script>
  </body>
</html>
