<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>Sign in — Better Auth Worker Kit</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="sign-in">
    <main class="auth-shell">
      <header class="brand" aria-label="Better Auth Worker Kit">
        <span class="brand-mark" aria-hidden="true">B</span>
        <span>Better Auth Worker Kit</span>
      </header>
      <section class="auth-card" aria-labelledby="sign-in-title">
        <div class="auth-card__body">
          <div class="app-identity">
            <span>better-auth-worker-kit</span>
          </div>
          <h1 id="sign-in-title">Log in to Better Auth Worker Kit</h1>
          <div class="auth-options">
            <div class="auth-group">
              <p class="field-label">Sign in with:</p>
              <button id="primary-action" class="provider-button" type="button">
                <svg aria-hidden="true" viewBox="0 -960 960 960" fill="currentColor">
                  <path d="M120-160v-112q0-34 17.5-62.5T184-378q62-31 126-46.5T440-440q20 0 40 1.5t40 4.5q-4 58 21 109.5t73 84.5v80H120ZM760-40l-60-60v-186q-44-13-72-49.5T600-420q0-58 41-99t99-41q58 0 99 41t41 99q0 45-25.5 80T790-290l50 50-60 60 60 60-80 80ZM440-480q-66 0-113-47t-47-113q0-66 47-113t113-47q66 0 113 47t47 113q0 66-47 113t-113 47Zm300 80q17 0 28.5-11.5T780-440q0-17-11.5-28.5T740-480q-17 0-28.5 11.5T700-440q0 17 11.5 28.5T740-400Z"></path>
                </svg>
                <span>Passkey ・ This device or security key</span>
              </button>
              <output id="status" aria-live="polite"></output>
            </div>

            <div class="divider" role="separator" aria-orientation="horizontal"><span>or</span></div>

            <section class="request-invite" aria-label="Request an invitation">
              <form id="invite-request-form">
                <div class="form-row">
                  <label for="invite-email">Email</label>
                  <input id="invite-email" name="email" type="email" autocomplete="email" placeholder="example@email.com" required maxlength="254">
                </div>
                <div id="turnstile-widget"></div>
                <div class="form-row">
                  <button class="primary-button" type="submit">Request invitation</button>
                </div>
              </form>
              <output id="invite-request-status" aria-live="polite"></output>
            </section>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="/assets/client.js"></script>
  </body>
</html>
