<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>Sign in — andrewe.dev</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="sign-in">
    <main class="auth-shell">
      <header class="brand">
        <img class="brand-logo" src="/assets/cloudflare-access.svg" alt="Cloudflare Access">
      </header>
      <section class="auth-card" aria-labelledby="sign-in-title">
        <div class="auth-card__body">
          <div class="app-identity"><span data-app-name>andrewe.dev</span></div>
          <h1 id="sign-in-title">Sign in to <span data-login-target>andrewe.dev</span></h1>
          <div id="sign-in-options" class="auth-options">
            <div class="auth-group">
              <button id="primary-action" class="provider-button" type="button">
                <svg aria-hidden="true" viewBox="0 -960 960 960" fill="currentColor">
                  <path d="M120-160v-112q0-34 17.5-62.5T184-378q62-31 126-46.5T440-440q20 0 40 1.5t40 4.5q-4 58 21 109.5t73 84.5v80H120ZM760-40l-60-60v-186q-44-13-72-49.5T600-420q0-58 41-99t99-41q58 0 99 41t41 99q0 45-25.5 80T790-290l50 50-60 60 60 60-80 80ZM440-480q-66 0-113-47t-47-113q0-66 47-113t113-47q66 0 113 47t47 113q0 66-47 113t-113 47Zm300 80q17 0 28.5-11.5T780-440q0-17-11.5-28.5T740-480q-17 0-28.5 11.5T700-440q0 17 11.5 28.5T740-400Z"></path>
                </svg>
                <span>Sign in with passkey</span>
              </button>
              <output id="status" aria-live="polite"></output>
            </div>

            <div class="divider" role="separator" aria-orientation="horizontal"><span>or</span></div>

            <section class="request-invite" aria-label="Request an invitation">
              <form id="invite-request-form">
                <div class="form-row">
                  <label for="invite-email">Email</label>
                  <input id="invite-email" name="email" type="email" autocomplete="email" placeholder="example@email.com" required maxlength="254">
                </div>
                <div id="turnstile-widget"></div>
                <div class="form-row">
                  <button class="primary-button" type="submit">Request invitation</button>
                </div>
              </form>
              <output id="invite-request-status" class="confirmation-message" aria-live="polite"></output>
              <div id="invitation-confirmation" class="information-panel invitation-confirmation" hidden>
                If <span id="invitation-confirmation-email" class="confirmation-email"></span> is authorized, an invitation will be sent.
              </div>
            </section>
          </div>
          <div id="signed-in-options" class="auth-options" hidden>
            <dl class="signed-in-details">
              <div>
                <dt>user:</dt>
                <dd id="signed-in-email"></dd>
              </div>
              <div id="signed-in-created-at-row" hidden>
                <dt>created:</dt>
                <dd id="signed-in-created-at"></dd>
              </div>
            </dl>
            <button id="sign-out-action" class="provider-button" type="button">
              <img class="sign-out-icon" src="/assets/rectangle.portrait.and.arrow.right-regular.svg" alt="">
              <span>Sign out</span>
            </button>
          </div>
        </div>
      </section>
    </main>
    <footer class="project-credit">
      <a href="https://github.com/andesco/cloudflare-access-passkeys-kit">cloudflare-access-passkeys-kit</a>
    </footer>
    <script type="module" src="/assets/client.js"></script>
  </body>
</html>
